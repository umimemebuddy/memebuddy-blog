<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050507;
      color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      font-weight: 400;
      color: #00d992;
      margin-bottom: 8px;
    }
    p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .dropzone {
      border: 2px dashed #3d3a39;
      border-radius: 12px;
      padding: 48px 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #00d992;
      background: rgba(0, 217, 146, 0.05);
    }
    .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    input { display: none; }
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #101010;
      border: 1px solid #00d992;
      border-radius: 8px;
      display: none;
    }
    .result input {
      display: block;
      width: 100%;
      padding: 10px;
      background: #050507;
      border: 1px solid #3d3a39;
      border-radius: 4px;
      color: #00d992;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .result button {
      padding: 8px 16px;
      background: #00d992;
      color: #050507;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .error {
      margin-top: 20px;
      padding: 16px;
      background: rgba(251, 86, 91, 0.1);
      border: 1px solid #fb565b;
      border-radius: 8px;
      color: #fb565b;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ 图片上传</h1>
    <p>选择或拖拽图片到此处</p>
    
    <div class="dropzone" onclick="document.getElementById('file').click()">
      <div class="icon">📤</div>
      <div>点击选择图片</div>
      <div style="font-size: 12px; color: #666; margin-top: 8px;">支持 JPG, PNG, GIF, WebP · 最大 5MB</div>
    </div>
    
    <input type="file" id="file" accept="image/*">
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result">
      <input type="text" id="url" readonly>
      <button onclick="copy()">复制链接</button>
      <button onclick="openImg()" style="margin-left: 8px; background: #3d3a39; color: #f2f2f2;">查看</button>
    </div>
  </div>

  <script>
    const dropzone = document.querySelector('.dropzone');
    const fileInput = document.getElementById('file');
    const result = document.getElementById('result');
    const urlInput = document.getElementById('url');
    const error = document.getElementById('error');

    // Drag & drop
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) upload(fileInput.files[0]);
    });

    async function upload(file) {
      if (file.size > 5 * 1024 * 1024) {
        showError('文件太大，最大 5MB');
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      dropzone.innerHTML = '<div class="icon">⏳</div><div>上传中...</div>';

      try {
        const res = await fetch('https://img.memebuddy.cc/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.url) {
          urlInput.value = data.url;
          result.style.display = 'block';
          error.style.display = 'none';
          dropzone.innerHTML = '<div class="icon">✅</div><div>上传成功!</div>';
        } else {
          throw new Error(data.error || '上传失败');
        }
      } catch (e) {
        showError(e.message);
        dropzone.innerHTML = '<div class="icon">📤</div><div>点击选择图片</div>';
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.style.display = 'block';
    }

    function copy() {
      navigator.clipboard.writeText(urlInput.value);
      alert('已复制!');
    }

    function openImg() {
      window.open(urlInput.value, '_blank');
    }
  </script>
</body>
</html>
