<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GemHunter · 天津</title>
  <style>
    :root {
      --bg: #f5f5f3;
      --text: #5a5a5a;
      --accent: #6b8e7a;
      --line: #e5e5e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.7;
      font-size: 14px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 50px 20px;
    }
    header {
      margin-bottom: 40px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 5px;
      color: var(--text);
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    nav {
      display: flex;
      gap: 16px;
      margin-bottom: 35px;
      flex-wrap: wrap;
    }
    nav a {
      font-size: 12px;
      color: #999;
      text-decoration: none;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active {
      color: var(--accent);
      border-color: var(--accent);
    }
    .empty {
      text-align: center;
      padding: 40px 0;
      color: #ccc;
      font-size: 13px;
    }
    footer {
      margin-top: 50px;
      padding-top: 25px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      color: #ccc;
      text-align: center;
    }
    @media (max-width: 600px) {
      .container { padding: 40px 16px; }
      h1 { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>GEMHUNTER</h1>
      <p class="subtitle">FGA · 天津</p>
    </header>

    <nav>
      <a href="#" class="active">全部</a>
      <a href="#">新货</a>
      <a href="#">旅行见闻</a>
      <a href="#">精选藏品</a>
    </nav>

    <div class="posts">
      <div class="empty">即将上线 · Stay tuned</div>
    </div>

    <footer>
      <p>© 2026 GemHunter · 天津</p>
    </footer>
  </div>
</body>
</html>
