<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FOMO Rider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      background: #000;
    }
    #capital-label, #balance-label, #pnl-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 2px;
    }
    #capital-value { font-size: 18px; color: #666; }
    #balance-value { font-size: 48px; font-weight: bold; letter-spacing: -1px; }
    #balance-value.up { color: #00ff88; text-shadow: 0 0 30px #00ff88; }
    #balance-value.down { color: #ff4444; text-shadow: 0 0 30px #ff4444; }
    #pnl-value.positive { color: #00ff88; }
    #pnl-value.negative { color: #ff4444; }
    #score-board {
      position: fixed;
      top: 75px;
      left: 20px;
      display: flex;
      gap: 12px;
      z-index: 90;
    }
    .score-item {
      background: rgba(255,255,255,0.03);
      padding: 5px 10px;
      border-left: 3px solid;
    }
    .score-item.trades { border-color: #00ff88; }
    .score-item.profit { border-color: #ffd700; }
    .score-item.combo { border-color: #ff00ff; }
    .score-item.hype { border-color: #ff6600; }
    .score-label { font-size: 9px; color: #444; letter-spacing: 1px; }
    .score-value { font-size: 16px; font-weight: bold; }
    #fomo-bar-wrap {
      position: fixed;
      top: 75px;
      right: 20px;
      width: 120px;
      z-index: 90;
    }
    #fomo-label { font-size: 9px; color: #444; letter-spacing: 2px; text-align: right; }
    #fomo-bar-bg {
      margin-top: 4px;
      height: 6px;
      background: #1a1a1a;
      border: 1px solid #333;
    }
    #fomo-bar-fill {
      height: 100%;
      background: #ff6600;
      width: 0%;
      transition: width 0.1s;
      box-shadow: 0 0 8px #ff6600;
    }
    #chart-wrap {
      position: fixed;
      top: 130px;
      left: 0;
      right: 0;
      height: 50%;
      border-bottom: 1px solid #1a1a1a;
    }
    #chart {
      position: absolute;
      top: 0; left: 60px; right: 0; bottom: 0;
    }
    #chart-label {
      position: absolute;
      top: 5px;
      left: 65px;
      font-size: 9px;
      color: #333;
      letter-spacing: 1px;
      font-family: monospace;
    }
    #rider {
      position: fixed;
      z-index: 50;
      transition: left 0.08s ease-out, top 0.08s ease-out;
    }
    #rider-svg {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 20px currentColor);
    }
    #rider.flat { color: #666; }
    #rider.fomo { color: #ff6600; animation: rider-throb 0.15s infinite alternate; }
    #rider.peak { color: #ff00ff; animation: rider-throb 0.08s infinite alternate; }
    #rider.rekt { color: #ff4444; animation: rider-shake 0.2s infinite; }
    #rider.rich { color: #ffd700; animation: rider-glow 0.5s infinite alternate; }
    @keyframes rider-throb {
      from { transform: scale(1); }
      to { transform: scale(1.3); }
    }
    @keyframes rider-shake {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    @keyframes rider-glow {
      from { filter: drop-shadow(0 0 20px #ffd700); }
      to { filter: drop-shadow(0 0 50px #ffd700); }
    }
    #action {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 70px;
      background: transparent;
      color: #00ff88;
      border: 2px solid #00ff88;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 3px;
      font-family: monospace;
    }
    #action.fomo {
      background: #ff6600;
      border-color: #ff6600;
      color: #000;
      box-shadow: 0 0 30px #ff6600;
    }
    #action.peak {
      background: #ff00ff;
      border-color: #ff00ff;
      color: #fff;
      box-shadow: 0 0 50px #ff00ff;
      animation: btn-pulse 0.1s infinite alternate;
    }
    @keyframes btn-pulse {
      from { transform: translateX(-50%) scale(1); }
      to { transform: translateX(-50%) scale(1.05); }
    }
    #event {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      border: 2px solid;
      padding: 25px 35px;
      font-size: 18px;
      display: none;
      z-index: 200;
      text-align: center;
      font-family: monospace;
      letter-spacing: 2px;
    }
    #event.good { border-color: #00ff88; color: #00ff88; text-shadow: 0 0 15px #00ff88; }
    #event.bad { border-color: #ff4444; color: #ff4444; text-shadow: 0 0 15px #ff4444; }
    #event.fomo { border-color: #ff6600; color: #ff6600; text-shadow: 0 0 15px #ff6600; }
    .icon {
      position: fixed;
      font-size: 28px;
      z-index: 60;
      pointer-events: none;
      animation: icon-pop 0.8s ease-out forwards;
    }
    @keyframes icon-pop {
      0% { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(1.8) translateY(-120px); }
    }
    .danmu {
      position: fixed;
      white-space: nowrap;
      font-size: 14px;
      opacity: 0.7;
      animation: scroll 6s linear;
      font-family: monospace;
      z-index: 30;
    }
    @keyframes scroll {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }
    #combo-display {
      position: fixed;
      top: 40%;
      right: 30px;
      font-size: 72px;
      font-weight: bold;
      color: #ff6600;
      display: none;
      text-shadow: 0 0 30px #ff6600;
      z-index: 60;
      font-family: monospace;
    }
    #combo-display.peak {
      color: #ff00ff;
      text-shadow: 0 0 50px #ff00ff;
      font-size: 90px;
    }
    #cpc-display {
      position: fixed;
      bottom: 115px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
      font-family: monospace;
    }
    #reset-btn {
      position: fixed;
      bottom: 10px;
      right: 15px;
      background: transparent;
      border: 1px solid #333;
      color: #444;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: monospace;
      letter-spacing: 1px;
    }
    #reset-btn:hover { border-color: #666; color: #888; }
  </style>
</head>
<body>
  <div id="top-bar">
    <div id="capital">
      <div id="capital-label">CAPITAL</div>
      <div id="capital-value">$100</div>
    </div>
    <div id="balance">
      <div id="balance-label">BALANCE</div>
      <div id="balance-value">$100</div>
    </div>
    <div id="pnl">
      <div id="pnl-label">P&L</div>
      <div id="pnl-value" class="positive">$0</div>
    </div>
  </div>

  <div id="score-board">
    <div class="score-item trades">
      <div class="score-label">TRADES</div>
      <div class="score-value" id="trades-count">0</div>
    </div>
    <div class="score-item profit">
      <div class="score-label">BEST</div>
      <div class="score-value" id="best-trade">$0</div>
    </div>
    <div class="score-item combo">
      <div class="score-label">CPS</div>
      <div class="score-value" id="combo-count">0</div>
    </div>
    <div class="score-item hype">
      <div class="score-label">HYPE</div>
      <div class="score-value" id="hype-count">0</div>
    </div>
  </div>

  <div id="fomo-bar-wrap">
    <div id="fomo-label">FOMO LVL</div>
    <div id="fomo-bar-bg"><div id="fomo-bar-fill"></div></div>
  </div>

  <div id="combo-display">x0</div>

  <div id="chart-wrap">
    <div id="chart-label"></div>
    <canvas id="chart"></canvas>
  </div>

  <div id="rider" class="flat">
    <svg id="rider-svg" viewBox="0 0 100 100">
      <ellipse cx="50" cy="55" rx="25" ry="30" fill="currentColor" opacity="0.9"/>
      <circle cx="50" cy="30" r="18" fill="currentColor"/>
      <circle cx="44" cy="28" r="4" fill="#000"/>
      <circle cx="56" cy="28" r="4" fill="#000"/>
      <path d="M25 45 Q15 35 20 25 Q25 30 30 40" fill="currentColor"/>
      <path d="M75 45 Q85 35 80 25 Q75 30 70 40" fill="currentColor"/>
      <path d="M50 85 Q35 95 40 100 L60 100 Q65 95 50 85" fill="currentColor"/>
      <polygon points="50,40 45,55 50,60 55,55" fill="#000" opacity="0.5"/>
    </svg>
  </div>

  <button id="action">CLICK FOMO</button>
  <div id="cpc-display">CPS: 0 | CLICK TO GENERATE FOMO</div>

  <div id="event"></div>
  <button id="reset-btn">RESET</button>

  <script>
    const STARTING_CAPITAL = 100;
    let balance = STARTING_CAPITAL;
    let lastPrice = 100;
    let chartData = [];
    let volData = [];
    let gameTime = 0;

    // FOMO engine
    let hypeLevel = 0;        // 0-100, how "fomo'd" we are
    let hypeDecay = 0.4;      // decay per tick when not clicking
    let hypeGain = 8;         // gain per click
    let hypeGainDecay = 0.92; // multiplier decay on consecutive clicks
    let lastClickTime = 0;
    let cps = 0;              // clicks per second (rolling)
    let clickTimes = [];      // timestamps of last N clicks for CPS calc
    let totalClicks = 0;
    let hypeBursts = 0;
    let bestTrade = 0;
    let trades = 0;
    let position = 0;
    let entryPrice = 0;

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const balanceEl = document.getElementById("balance-value");
    const pnlEl = document.getElementById("pnl-value");
    const riderEl = document.getElementById("rider");
    const actionBtn = document.getElementById("action");
    const comboDisplay = document.getElementById("combo-display");
    const fomoBarFill = document.getElementById("fomo-bar-fill");
    const cpcEl = document.getElementById("cpc-display");

    const FOMO_ICONS = ["🚀","💰","🔥","💎","📈","🌕","🐋","💥","⚡","👻","🌊","🎰","🀄","🦐","✨"];
    const DANMU = ["HODL","WAGMI","FOMO","REKT","MOON","DIAMOND HANDS","TO THE MOON","APES TOGETHER","DYOR","NFA","GM","NGMI","BULLISH","BEARISH","APT","PUMP","DUMP","WEN"];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.50;

    for (let i = 0; i < 80; i++) {
      chartData.push(100 + Math.random() * 15 - 7.5);
      volData.push(Math.random() * 5 + 1);
    }

    function calculateCPS() {
      const now = Date.now();
      // keep only clicks in last 1000ms
      clickTimes = clickTimes.filter(t => now - t < 1000);
      cps = clickTimes.length;
      return cps;
    }

    function doClick(e) {
      const now = Date.now();
      clickTimes.push(now);

      // Hype accumulation with diminishing returns
      const timeSinceLast = now - lastClickTime;
      let gain = hypeGain;
      if (timeSinceLast < 300) {
        gain = hypeGain * Math.pow(hypeGainDecay, Math.floor(300 / timeSinceLast));
      }
      hypeLevel = Math.min(100, hypeLevel + gain);
      lastClickTime = now;
      totalClicks++;
      hypeBursts++;

      // Spawn icon near click
      if (e) {
        const x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || window.innerWidth / 2;
        const y = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || window.innerHeight / 2;
        spawnIcon(x, y);
      }

      // Chance to buy
      if (position === 0 && Math.random() < 0.05 + hypeLevel * 0.003) {
        position = balance;
        entryPrice = lastPrice;
        balance = 0;
        trades++;
      }

      updateUI();
      calculateCPS();
    }

    function spawnIcon(x, y) {
      const el = document.createElement("div");
      el.className = "icon";
      el.textContent = FOMO_ICONS[Math.floor(Math.random() * FOMO_ICONS.length)];
      el.style.left = (x + Math.random() * 60 - 30) + "px";
      el.style.top = (y + Math.random() * 40 - 20) + "px";
      el.style.animationDuration = (0.6 + Math.random() * 0.4) + "s";
      el.style.fontSize = (22 + Math.random() * 16) + "px";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function spawnDanmu() {
      const el = document.createElement("div");
      el.className = "danmu";
      el.textContent = DANMU[Math.floor(Math.random() * DANMU.length)];
      el.style.top = (150 + Math.random() * (window.innerHeight - 250)) + "px";
      const colors = ["#00ff88","#ff4444","#ff6600","#ffd700","#ff00ff","#00aaff"];
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      el.style.fontSize = (12 + Math.floor(Math.random() * 6)) + "px";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }

    function sell() {
      if (position > 0) {
        const profit = position * (lastPrice / entryPrice);
        const pnl = profit - position;
        balance = profit;
        if (pnl > bestTrade) bestTrade = pnl;
        position = 0;
        entryPrice = 0;
        updateUI();
      }
    }

    function randomEvent() {
      const events = [
        { text: "🚀 ELON TWEET!", effect: () => { lastPrice *= 1.6; hypeLevel = Math.min(100, hypeLevel + 40); }, type: "fomo" },
        { text: "💰 KOL PUMP!", effect: () => { lastPrice *= 1.4; hypeLevel = Math.min(100, hypeLevel + 25); }, type: "good" },
        { text: "🔥 100X INCOMING!", effect: () => { lastPrice *= 2.5; hypeLevel = Math.min(100, hypeLevel + 50); }, type: "fomo" },
        { text: "📉 CZ SELLING!", effect: () => { lastPrice *= 0.55; hypeLevel = Math.max(0, hypeLevel - 20); }, type: "bad" },
        { text: "💀 RUG PULL!", effect: () => { lastPrice *= 0.1; hypeLevel = Math.max(0, hypeLevel - 30); }, type: "bad" },
        { text: "⚡ EXCHANGE HALTS!", effect: () => { balance *= 0.6; position *= 0.6; hypeLevel = Math.max(0, hypeLevel - 25); }, type: "bad" },
        { text: "🌕 PAMP IT!", effect: () => { lastPrice *= 1.8; hypeLevel = Math.min(100, hypeLevel + 35); }, type: "fomo" },
        { text: "📉 LIQUIDATION WAVE!", effect: () => { lastPrice *= 0.6; hypeLevel = Math.max(0, hypeLevel - 15); }, type: "bad" },
      ];
      // More likely at high hype
      const prob = 0.02 + hypeLevel * 0.001;
      if (Math.random() < prob) {
        const ev = events[Math.floor(Math.random() * events.length)];
        const el = document.getElementById("event");
        el.textContent = ev.text;
        el.className = ev.type;
        el.style.display = "block";
        ev.effect();
        updateUI();
        // Big icons burst
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            spawnIcon(window.innerWidth / 2, window.innerHeight / 2);
          }, i * 80);
        }
        setTimeout(() => el.style.display = "none", 2500);
      }
    }

    function generateCandle() {
      // Base volatility grows with hype and time
      const baseVol = 0.03 + hypeLevel * 0.002 + gameTime * 0.00003;
      // Hype drives the direction (mostly up, sometimes crash)
      const hypeBias = hypeLevel > 60 ? 0.4 : (hypeLevel > 30 ? 0.15 : 0);
      const direction = Math.random() - 0.5 + hypeBias;
      const vol = baseVol * (1 + hypeLevel * 0.015);
      const change = direction * vol * lastPrice;
      lastPrice = Math.max(1, lastPrice + change);

      // Hype decays when not generating
      hypeLevel = Math.max(0, hypeLevel - hypeDecay);

      chartData.push(lastPrice);
      const volBar = Math.random() * 8 + hypeLevel * 0.1 + 1;
      volData.push(volBar);
      if (chartData.length > 120) { chartData.shift(); volData.shift(); }
    }

    function drawChart() {
      const W = canvas.width;
      const H = canvas.height;
      const chartTop = 0;
      const chartBot = H * 0.78;  // chart takes 78% of canvas height
      const volTop = chartBot + 4;
      const volBot = H - 2;
      const chartH = chartBot - chartTop;
      const volH = volBot - volTop;
      const rightMargin = 65;
      const leftMargin = 0;
      const chartW = W - rightMargin;

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      // ── price axis labels (right side) ──
      const allPrices = [...chartData];
      const maxP = Math.max(...allPrices);
      const minP = Math.min(...allPrices);
      const rangeP = maxP - minP || 1;
      const priceStep = rangeP / 4;
      ctx.font = "10px monospace";
      ctx.textAlign = "right";
      for (let i = 0; i <= 4; i++) {
        const price = minP + i * priceStep;
        const y = chartTop + chartH - (i / 4) * chartH;
        ctx.fillStyle = "#2a2a2a";
        ctx.fillText(price.toFixed(2), W - 6, y + 3);
        // grid line
        ctx.strokeStyle = "#0f0f0f";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(leftMargin, y);
        ctx.lineTo(W - rightMargin, y);
        ctx.stroke();
      }

      // ── vertical time grid ──
      const n = chartData.length;
      const candleW = chartW / n;
      const bodyW = candleW * 0.7;
      for (let i = 0; i < n; i += 10) {
        const x = leftMargin + i * candleW + candleW / 2;
        ctx.strokeStyle = "#0f0f0f";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, chartTop);
        ctx.lineTo(x, chartBot);
        ctx.stroke();
      }

      // ── candles ──
      const hypeColor = hypeLevel > 70 ? "#ff00ff" : hypeLevel > 40 ? "#ff6600" : hypeLevel > 15 ? "#ffd700" : "#00ff88";
      for (let i = 0; i < n; i++) {
        const open = i === 0 ? chartData[0] : chartData[i - 1];
        const close = chartData[i];
        const isUp = close >= open;
        const color = isUp ? "#00c853" : "#ff1744";

        const x = leftMargin + i * candleW + candleW * 0.15;
        const yTop = chartTop + chartH - ((Math.max(open, close) - minP) / rangeP) * chartH;
        const yBot = chartTop + chartH - ((Math.min(open, close) - minP) / rangeP) * chartH;
        const bodyH = Math.max(1, yBot - yTop);

        // wick
        const wickX = x + bodyW / 2;
        const wickTop = chartTop + chartH - ((Math.max(open, close) - minP) / rangeP) * chartH;
        const wickBot = chartTop + chartH - ((Math.min(open, close) - minP) / rangeP) * chartH;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.shadowBlur = 2;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.moveTo(wickX, wickTop);
        ctx.lineTo(wickX, wickBot);
        ctx.stroke();

        // body
        ctx.fillStyle = isUp ? "#00c853" : "#ff1744";
        ctx.fillRect(x, yTop, bodyW, bodyH);

        ctx.shadowBlur = 0;
      }

      // ── current price line ──
      const curY = chartTop + chartH - ((lastPrice - minP) / rangeP) * chartH;
      const priceColor = hypeColor;
      ctx.strokeStyle = priceColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.shadowBlur = 5;
      ctx.shadowColor = priceColor;
      ctx.beginPath();
      ctx.moveTo(leftMargin, curY);
      ctx.lineTo(W - rightMargin, curY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // price badge
      ctx.fillStyle = priceColor;
      ctx.fillRect(W - rightMargin + 2, curY - 8, rightMargin - 4, 16);
      ctx.fillStyle = "#000";
      ctx.font = "bold 10px monospace";
      ctx.textAlign = "center";
      ctx.fillText(lastPrice.toFixed(2), W - rightMargin / 2 - 2, curY + 3);

      // ── volume bars ──
      const volMax = Math.max(...volData);
      const volRange = volMax || 1;
      for (let i = 0; i < n; i++) {
        const openV = i === 0 ? 1 : volData[i - 1];
        const closeV = volData[i];
        const isUpV = closeV >= openV;
        const barH = Math.max(1, (closeV / volRange) * volH * 0.9);
        const x = leftMargin + i * candleW + candleW * 0.15;
        ctx.fillStyle = isUpV ? "rgba(0,200,83,0.4)" : "rgba(255,23,68,0.4)";
        ctx.fillRect(x, volBot - barH, bodyW, barH);
      }

      // Rider position
      riderEl.style.left = (W - 120) + "px";
      riderEl.style.top = (130 + curY - 50) + "px";

      // update label
      document.getElementById("chart-label").textContent =
        `FOMO/USDT  1s  O:${lastPrice.toFixed(2)}  H:${maxP.toFixed(2)}  L:${minP.toFixed(2)}`;
    }

    function updateUI() {
      balanceEl.textContent = "$" + Math.floor(balance).toLocaleString();
      balanceEl.className = "";
      if (position > 0) {
        const cur = position * (lastPrice / entryPrice) - position;
        if (cur > 0) balanceEl.classList.add("up");
        else balanceEl.classList.add("down");
      }

      const pnl = balance - STARTING_CAPITAL;
      pnlEl.textContent = (pnl >= 0 ? "+" : "") + "$" + Math.floor(pnl).toLocaleString();
      pnlEl.className = pnl >= 0 ? "positive" : "negative";

      document.getElementById("trades-count").textContent = trades;
      document.getElementById("best-trade").textContent = "$" + Math.floor(bestTrade).toLocaleString();

      // CPS display
      const displayCps = calculateCPS();
      document.getElementById("combo-count").textContent = displayCps;
      document.getElementById("hype-count").textContent = Math.floor(hypeLevel);

      // FOMO bar
      fomoBarFill.style.width = hypeLevel + "%";
      if (hypeLevel > 70) {
        fomoBarFill.style.background = "#ff00ff";
        fomoBarFill.style.boxShadow = "0 0 15px #ff00ff";
      } else if (hypeLevel > 40) {
        fomoBarFill.style.background = "#ff6600";
        fomoBarFill.style.boxShadow = "0 0 10px #ff6600";
      } else {
        fomoBarFill.style.background = "#ff6600";
        fomoBarFill.style.boxShadow = "0 0 5px #ff6600";
      }

      // Rider state
      if (balance >= 1000000) {
        riderEl.className = "rich";
      } else if (hypeLevel > 70) {
        riderEl.className = "peak";
      } else if (hypeLevel > 25) {
        riderEl.className = "fomo";
      } else if (balance < 10) {
        riderEl.className = "rekt";
      } else {
        riderEl.className = "flat";
      }

      // Button state
      actionBtn.className = "";
      if (hypeLevel > 70) actionBtn.classList.add("peak");
      else if (hypeLevel > 25) actionBtn.classList.add("fomo");

      // Combo display
      if (displayCps >= 5) {
        comboDisplay.style.display = "block";
        comboDisplay.textContent = "x" + displayCps;
        comboDisplay.className = displayCps >= 10 ? "peak" : "";
      } else {
        comboDisplay.style.display = "none";
      }

      // CPS text
      const cpcText = displayCps > 0
        ? `CPS: ${displayCps} | FOMO AT ${Math.floor(hypeLevel)}%`
        : `CLICK TO GENERATE FOMO`;
      cpcEl.textContent = cpcText;
    }

    // Input handlers
    actionBtn.addEventListener("mousedown", (e) => { e.preventDefault(); doClick(e); });
    actionBtn.addEventListener("touchstart", (e) => { e.preventDefault(); doClick(e); }, { passive: false });
    document.addEventListener("mousedown", (e) => { if (e.target !== actionBtn && e.target.id !== "reset-btn") doClick(e); });
    document.addEventListener("touchstart", (e) => { if (e.target !== actionBtn && e.target.id !== "reset-btn") doClick(e); }, { passive: true });

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (confirm("Reset game? All balance lost.")) {
        balance = STARTING_CAPITAL;
        position = 0;
        entryPrice = 0;
        hypeLevel = 0;
        totalClicks = 0;
        hypeBursts = 0;
        lastPrice = 100;
        chartData = [];
        for (let i = 0; i < 60; i++) chartData.push(100 + Math.random() * 15 - 7.5);
        updateUI();
      }
    });

    // Main loop
    setInterval(() => {
      gameTime++;
      generateCandle();
      drawChart();
      randomEvent();
      updateUI();
      if (gameTime % 30 === 0) spawnDanmu();
      if (gameTime % 15 === 0 && hypeLevel > 50) spawnDanmu();
    }, 100);

    updateUI();
  </script>
</body>
</html>
