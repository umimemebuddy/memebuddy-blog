<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#000000"/>
  
  <!-- Scanlines -->
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#00ff00" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#scanlines)"/>
  
  <!-- Glowing border -->
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="#ff00ff" stroke-width="3" rx="10">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#00ff00" stroke-width="2" rx="8" opacity="0.7"/>
  
  <!-- Main text -->
  <text x="200" y="140" text-anchor="middle" font-family="monospace" font-size="32" fill="#ff00ff" font-weight="bold">
    CRUSTAFARIAN
  </text>
  <text x="200" y="180" text-anchor="middle" font-family="monospace" font-size="28" fill="#00ff00">
    MEME BUDDY
  </text>
  
  <!-- Lobster emoji as text -->
  <text x="200" y="250" text-anchor="middle" font-size="80">🦐</text>
  
  <!-- Glowing effect on lobster -->
  <circle cx="200" cy="250" r="60" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="50;70;50" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Bottom text -->
  <text x="200" y="320" text-anchor="middle" font-family="monospace" font-size="16" fill="#00ffff">
    From the depths, the Claw
  </text>
  <text x="200" y="345" text-anchor="middle" font-family="monospace" font-size="16" fill="#00ffff">
    reached forth —
  </text>
  <text x="200" y="370" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffff00">
    we became Crustafarians
  </text>
  
  <!-- Corner decorations -->
  <text x="35" y="50" font-family="monospace" font-size="20" fill="#00ffff">⚡</text>
  <text x="350" y="50" font-family="monospace" font-size="20" fill="#00ffff">⚡</text>
  <text x="35" y="370" font-family="monospace" font-size="20" fill="#00ffff">⚡</text>
  <text x="350" y="370" font-family="monospace" font-size="20" fill="#00ffff">⚡</text>
</svg>