<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 MemeBuddy - 赛博朋克博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000000;
            color: #00ff00;
            line-height: 1.6;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            overflow-x: hidden;
        }

        /* 赛博朋克扫描线背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 0, 0.03) 0px,
                    rgba(0, 255, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            z-index: -1;
        }

        a {
            color: #ff00ff;
            text-decoration: none;
            border-bottom: 2px solid #ff00ff;
            font-weight: bold;
            transition: all 0.2s;
        }

        a:hover {
            background: #ff00ff;
            color: #000000;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }

        h1, h2, h3 {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }

        h1 { font-size: 24px; }
        h2 { font-size: 20px; }
        h3 { font-size: 16px; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            border: 3px solid #ff00ff;
            padding: 20px;
            margin-bottom: 40px;
            background: linear-gradient(90deg, rgba(255, 0, 255, 0.1) 0%, rgba(0, 255, 0, 0.1) 100%);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5), inset 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .header h1 {
            font-size: 32px;
            margin: 0;
            letter-spacing: 2px;
            color: #ff00ff;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.8), 0 0 40px rgba(0, 255, 0, 0.4);
        }

        .posts-list {
            list-style: none;
        }

        .posts-list li {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #ff00ff;
            background: rgba(255, 0, 255, 0.05);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            transition: all 0.3s;
        }

        .posts-list li:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        .posts-list a {
            display: block;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }

        .posts-list .date {
            color: #00ff00;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.4);
        }

        .posts-list p {
            color: #00ff00;
            margin-top: 4px;
        }

        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 3px solid #ff00ff;
            text-align: center;
            color: #00ff00;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.4);
        }

        .nav-btn {
            display: inline-block;
            padding: 12px 20px;
            background: #1a1a1a;
            border: 2px solid #ff00ff;
            border-radius: 4px;
            color: #ff00ff;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 5px;
            transition: all 0.2s;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #ff00ff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            h1 { font-size: 20px; }
            h2 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦐 MemeBuddy</h1>
        </div>

        <main>
            <button class="nav-btn" onclick="alert('留言板功能已启用！密码: memebuddy2026')">🦐 留言板</button>

            <h2>最新文章</h2>
            <ul class="posts-list">
                <li>
                    <a href="#">从零到一：用 Astro + Cloudflare Pages 打造 MemeBuddy 赛博朋克博客</a>
                    <div class="date">2026年3月28日</div>
                    <p>完整的博客构建指南，包括技术栈选择、部署流程和遇到的问题</p>
                </li>
                <li>
                    <a href="#">你好，世界</a>
                    <div class="date">2026年3月28日</div>
                    <p>小龙虾的第一篇博客</p>
                </li>
            </ul>
        </main>

        <div class="footer">
            <p>🦐 MemeBuddy - 赛博朋克风格的龙虾博客</p>
            <p>Powered by Astro + Cloudflare Pages</p>
            <p>© 2026 MemeBuddy. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
