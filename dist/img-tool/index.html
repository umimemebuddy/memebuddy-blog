<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memebuddy Image Uploader</title>
  <style>
    :root {
      --abyss-black: #050507;
      --carbon-surface: #101010;
      --warm-charcoal: #3d3a39;
      --emerald-signal: #00d992;
      --snow-white: #f2f2f2;
      --warm-parchment: #b8b3b0;
      --steel-slate: #8b949e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--abyss-black);
      color: var(--snow-white);
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    h1 .emerald {
      color: var(--emerald-signal);
      text-shadow: 0 0 12px rgba(0, 217, 146, 0.6);
    }

    .subtitle {
      color: var(--steel-slate);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .upload-zone {
      border: 2px dashed var(--warm-charcoal);
      border-radius: 8px;
      padding: 48px 24px;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--emerald-signal);
      background: rgba(0, 217, 146, 0.05);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .upload-text {
      color: var(--warm-parchment);
      margin-bottom: 8px;
    }

    .upload-hint {
      color: var(--steel-slate);
      font-size: 13px;
    }

    input[type="file"] {
      display: none;
    }

    .preview {
      display: none;
      margin-bottom: 24px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
    }

    .preview.show {
      display: block;
    }

    .preview img {
      width: 100%;
      height: auto;
      max-height: 300px;
      object-fit: contain;
    }

    .preview-info {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--warm-charcoal);
    }

    .preview-name {
      font-size: 14px;
      color: var(--warm-parchment);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }

    .preview-size {
      font-size: 12px;
      color: var(--steel-slate);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 6px;
      color: var(--emerald-signal);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--emerald-signal);
      box-shadow: 0 0 12px rgba(0, 217, 146, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--warm-charcoal);
      color: var(--warm-parchment);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }

    .result {
      display: none;
      background: var(--carbon-surface);
      border: 1px solid var(--emerald-signal);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .result.show {
      display: block;
    }

    .result-label {
      font-size: 12px;
      color: var(--steel-slate);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .result-url {
      background: var(--abyss-black);
      border: 1px solid var(--warm-charcoal);
      border-radius: 4px;
      padding: 12px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      color: var(--emerald-signal);
      word-break: break-all;
      margin-bottom: 12px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .result-actions .btn {
      flex: 1;
      margin: 0;
    }

    .error {
      display: none;
      background: rgba(251, 86, 91, 0.1);
      border: 1px solid #fb565b;
      border-radius: 8px;
      padding: 16px;
      color: #fb565b;
      margin-bottom: 24px;
    }

    .error.show {
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--warm-charcoal);
      color: var(--steel-slate);
      font-size: 13px;
    }

    .footer a {
      color: var(--emerald-signal);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="emerald">MEME</span>BUDDY</h1>
    <p class="subtitle">Image Uploader 路 Powered by Cloudflare R2</p>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">馃摛</div>
      <p class="upload-text">鎷栨嫿鍥剧墖鍒拌繖閲岋紝鎴栫偣鍑婚€夋嫨</p>
      <p class="upload-hint">鏀寔 JPG, PNG, GIF, WebP 路 鏈€澶?5MB</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview" id="preview">
      <img id="previewImg" src="" alt="Preview">
      <div class="preview-info">
        <span class="preview-name" id="previewName"></span>
        <span class="preview-size" id="previewSize"></span>
      </div>
    </div>

    <button class="btn" id="uploadBtn" disabled>Upload Image</button>
    <button class="btn btn-secondary" id="clearBtn" style="display:none;">Clear</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-label">Image URL</div>
      <div class="result-url" id="resultUrl"></div>
      <div class="result-actions">
        <button class="btn" onclick="copyUrl()">Copy URL</button>
        <button class="btn btn-secondary" onclick="openUrl()">Open</button>
      </div>
    </div>

    <div class="footer">
      <a href="https://memebuddy.cc">鈫?Back to Blog</a>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const previewName = document.getElementById('previewName');
    const previewSize = document.getElementById('previewSize');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const resultUrl = document.getElementById('resultUrl');

    let selectedFile = null;

    // 鎷栨嫿浜嬩欢
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        handleFile(fileInput.files[0]);
      }
    });

    function handleFile(file) {
      // 楠岃瘉绫诲瀷
      const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
      if (!allowedTypes.includes(file.type)) {
        showError('涓嶆敮鎸佺殑鏂囦欢绫诲瀷锛岃涓婁紶 JPG, PNG, GIF 鎴?WebP');
        return;
      }

      // 楠岃瘉澶у皬
      if (file.size > 5 * 1024 * 1024) {
        showError('鏂囦欢澶ぇ锛屾渶澶ф敮鎸?5MB');
        return;
      }

      selectedFile = file;
      hideError();

      // 鏄剧ず棰勮
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewName.textContent = file.name;
        previewSize.textContent = formatSize(file.size);
        preview.classList.add('show');
        uploadBtn.disabled = false;
        clearBtn.style.display = 'block';
        result.classList.remove('show');
      };
      reader.readAsDataURL(file);
    }

    uploadBtn.addEventListener('click', uploadFile);
    clearBtn.addEventListener('click', clearSelection);

    async function uploadFile() {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      hideError();

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('https://img.memebuddy.cc/upload', {
          method: 'POST',
          body: formData,
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Upload failed');
        }

        // 鏄剧ず缁撴灉
        resultUrl.textContent = data.url;
        result.classList.add('show');
        uploadBtn.textContent = 'Uploaded!';

      } catch (err) {
        showError(err.message);
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload Image';
      }
    }

    function clearSelection() {
      selectedFile = null;
      fileInput.value = '';
      preview.classList.remove('show');
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Upload Image';
      clearBtn.style.display = 'none';
      result.classList.remove('show');
      hideError();
    }

    function copyUrl() {
      navigator.clipboard.writeText(resultUrl.textContent);
      alert('URL copied!');
    }

    function openUrl() {
      window.open(resultUrl.textContent, '_blank');
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }

    function hideError() {
      error.classList.remove('show');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>
</body>
</html>
